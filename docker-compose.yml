
services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - vman3-net
    # deploy section ignored by Compose
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  frontend:
    image: ilyatuu/vman3_frontend
    networks:
      - vman3-net
    volumes:
      - ./config.json:/usr/share/nginx/html/assets/config.json
    ports:
      - "4201:80"
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  backend:
    image: ilyatuu/vman3_backend:latest
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8080 --workers 2
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      # Override .env Redis URLs: inside Docker containers, 'localhost' resolves
      # to the container itself, not the Redis service. These override the
      # 'localhost:6370' values in .env so FastAPICache and the WebSocket
      # Pub/Sub listener can reach Redis via the Docker service name.
      REDIS_URL: "redis://redis:6379"
      REDIS_CELERY_URL: "redis://redis:6379"
      REDIS_PASSWORD: "vman@1029"
    networks:
      - vman3-net
    volumes:
      - ccva_files:/app/ccva_files
      - app_data:/app
      - settings_json:/vman3/settings.json
      - uploads:/vman3/app/uploads
      - hf_cache:/root/.cache/huggingface
    deploy:
      replicas: 3
      restart_policy:
        condition: any

  arango-db:
    image: arangodb/arangodb:3.12.2
    env_file:
      - .env
    networks:
      - vman3-net
    ports:
      - 8529:8529
    volumes:
      - vman3db:/var/lib/arangodb3
    command:
      - arangod
      - --server.endpoint=tcp://0.0.0.0:8529
      - --rocksdb.write-buffer-size=128MB
      - --rocksdb.total-write-buffer-size=512MB
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  redis:
    image: redis:7
    command: redis-server --requirepass vman@1029
    ports:
      - "6370:6379"
    networks:
      - vman3-net
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  celery-worker:
    image: ilyatuu/vman3_backend:latest
    command: >
      celery -A app.celery_app worker --loglevel=info --queues=celery,ccva,odk --concurrency=2
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      REDIS_URL: "redis://redis:6379"
      # celery_app.py reads REDIS_CELERY_URL for the broker URL
      REDIS_CELERY_URL: "redis://redis:6379"
      REDIS_PASSWORD: "vman@1029"
    networks:
      - vman3-net
    volumes:
      - ccva_files:/app/ccva_files
      - app_data:/app
      - uploads:/vman3/app/uploads
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - redis
      - arango-db
    deploy:
      replicas: 2  # Run 2 Celery workers for better throughput
      restart_policy:
        condition: any

  celery-beat:
    image: ilyatuu/vman3_backend:latest
    command: >
      celery -A app.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      REDIS_URL: "redis://redis:6379"
      REDIS_CELERY_URL: "redis://redis:6379"
      REDIS_PASSWORD: "vman@1029"
    networks:
      - vman3-net
    volumes:
      - ccva_files:/app/ccva_files
      - app_data:/app
    depends_on:
      - redis
      - arango-db
    deploy:
      replicas: 1
      restart_policy:
        condition: any

networks:
  vman3-net:
    external: true


volumes:
  vman3db:
  ccva_files:
    external: true
    name: vman3_ccva_files
  app_data:
  uploads:
    external: true
    name: vman3_uploads
  settings_json:
  hf_cache:
