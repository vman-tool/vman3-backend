
services:
  arango-db:
    image: arangodb/arangodb:3.12.2
    env_file:
      - .env
    networks:
      - vman3-net
    ports:
      - 8529:8529
    volumes:
      - vman3db:/var/lib/arangodb3
    command:
      - arangod
      - --server.endpoint=tcp://0.0.0.0:8529
      - --rocksdb.write-buffer-size=128MB
      - --rocksdb.total-write-buffer-size=512MB
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  redis:
    container_name: redis-vman3-dev
    image: redis:7.4-alpine
    command: redis-server --requirepass vman@1029
    ports:
      - "6370:6379"
    restart: always

  celery-worker:
    container_name: celery-worker-dev
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "python3",
        "-m",
        "celery",
        "-A",
        "app.celery_app",
        "worker",
        "--loglevel=info",
        "--concurrency=2",
        "-Q",
        "celery,ccva,odk"
      ]
    volumes:
      - ./app:/vman3/app
    networks:
      - default    # Redis lives on the default compose network
      - vman3-net  # ArangoDB lives on vman3-net; reach it by service name
    environment:
      PYTHONUNBUFFERED: "1"
      # Redis — same default compose network, use service name
      REDIS_URL: "redis://redis:6379"
      REDIS_PASSWORD: "vman@1029"
      # ArangoDB — use explicit container name to avoid conflict with deployment
      # arango-db (deployment) and backend-arango-db-1 (dev) both live on vman3-net;
      # point the worker at the dev instance that the FastAPI backend also uses.
      DB_URL: "http://backend-arango-db-1:8529"
      DB_NAME: "vman3"
      DB_ROOT_USER: "root"
      ARANGO_ROOT_USER: "root"
      ARANGO_ROOT_PASSWORD: "password"
      ARANGODB_URL: "http://backend-arango-db-1:8529/"
    depends_on:
      - redis
    restart: always

  flower:
    container_name: flower-dev
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "python3",
        "-m",
        "celery",
        "-A",
        "app.celery_app",
        "flower",
        "--port=5555"
      ]
    ports:
      - "5555:5555"
    environment:
      PYTHONUNBUFFERED: "1"
      REDIS_URL: "redis://redis:6379"
      REDIS_PASSWORD: "vman@1029"
    depends_on:
      - redis
      - celery-worker
    restart: always

networks:
  vman3-net:
    external: true


volumes:
  vman3db:
  ccva_files:
  app_data:
  uploads:
  settings_json:
